<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manaly Ray | Portfolio</title>
    <link rel="stylesheet" href="style.css"> </head>
<body>

    <section id="contact">
        <h2>Let's Connect 🚀</h2>
        <form id="contactForm">
            <div class="input-group">
                <label for="name">Name:</label>
                <input type="text" id="name" placeholder="Enter your name" required>
            </div>

            <div class="input-group">
                <label for="email">Email:</label>
                <input type="email" id="email" placeholder="Enter your email" required>
            </div>

            <div class="input-group">
                <label for="message">Project Details:</label>
                <textarea id="message" rows="5" placeholder="Tell me about your project..." required></textarea>
            </div>

            <button type="submit" id="submitBtn">Submit Project Details 🚀</button>
        </form>
    </section>

    <script>
        const contactForm = document.getElementById('contactForm');
        const submitBtn = document.getElementById('submitBtn');

        contactForm.addEventListener('submit', async (e) => {
            e.preventDefault(); 

            submitBtn.innerText = "Sending...";
            submitBtn.disabled = true;

            // Collect the data from the inputs
            const formData = {
                name: document.getElementById('name').value,
                email: document.getElementById('email').value,
                message: document.getElementById('message').value
            };

            try {
                // This sends the data to your /submit route in server.js
                const response = await fetch('/submit', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(formData)
                });

                if (response.ok) {
                    alert("Success! Your details have been saved to the Neon database.");
                    contactForm.reset(); // Clears the form
                } else {
                    alert("Oops! Something went wrong on the server.");
                }
            } catch (error) {
                console.error("Error:", error);
                alert("Could not connect to the server.");
            } finally {
                // Reset button text
                submitBtn.innerText = "Submit Project Details 🚀";
                submitBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
